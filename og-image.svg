<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#21262D"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid lines -->
  <g stroke="#21262D" stroke-width="1" opacity="0.6">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#58A6FF" opacity="0.8"/>

  <!-- Lamatic.ai branding -->
  <text x="80" y="90" font-family="'Inter', -apple-system, sans-serif" font-size="14" font-weight="500" fill="#8B949E" letter-spacing="0.08em">BY LAMATIC.AI</text>

  <!-- Main title -->
  <text x="80" y="155" font-family="'Inter', -apple-system, sans-serif" font-size="64" font-weight="800" fill="#E6EDF3" letter-spacing="-0.03em">LLM Ops Toolkit</text>

  <!-- Subtitle -->
  <text x="80" y="205" font-family="'Inter', -apple-system, sans-serif" font-size="22" font-weight="400" fill="#8B949E">Real-time uptime monitoring across 18+ AI API providers</text>

  <!-- Divider -->
  <line x1="80" y1="240" x2="1120" y2="240" stroke="#30363D" stroke-width="1"/>

  <!-- Section label -->
  <text x="80" y="285" font-family="'Inter', -apple-system, sans-serif" font-size="13" font-weight="600" fill="#8B949E" letter-spacing="0.08em">PROVIDER STATUS OVERVIEW</text>

  <!-- Provider cards: 5 major providers -->
  <!-- Card 1: OpenAI -->
  <rect x="80" y="308" width="202" height="86" rx="10" fill="url(#cardGrad)" stroke="#30363D" stroke-width="1"/>
  <circle cx="110" cy="338" r="9" fill="#3FB95022"/>
  <circle cx="110" cy="338" r="5" fill="#3FB950" filter="url(#glow)"/>
  <text x="130" y="344" font-family="'Inter', -apple-system, sans-serif" font-size="15" font-weight="600" fill="#E6EDF3">ChatGPT</text>
  <text x="130" y="362" font-family="'Inter', -apple-system, sans-serif" font-size="12" fill="#8B949E">OpenAI</text>
  <rect x="97" y="372" width="72" height="18" rx="9" fill="#3FB95022"/>
  <text x="133" y="385" font-family="'Inter', -apple-system, sans-serif" font-size="10" font-weight="600" fill="#3FB950" text-anchor="middle" letter-spacing="0.05em">OPERATIONAL</text>

  <!-- Card 2: Anthropic -->
  <rect x="302" y="308" width="202" height="86" rx="10" fill="url(#cardGrad)" stroke="#30363D" stroke-width="1"/>
  <circle cx="332" cy="338" r="9" fill="#3FB95022"/>
  <circle cx="332" cy="338" r="5" fill="#3FB950" filter="url(#glow)"/>
  <text x="352" y="344" font-family="'Inter', -apple-system, sans-serif" font-size="15" font-weight="600" fill="#E6EDF3">Claude</text>
  <text x="352" y="362" font-family="'Inter', -apple-system, sans-serif" font-size="12" fill="#8B949E">Anthropic</text>
  <rect x="319" y="372" width="72" height="18" rx="9" fill="#3FB95022"/>
  <text x="355" y="385" font-family="'Inter', -apple-system, sans-serif" font-size="10" font-weight="600" fill="#3FB950" text-anchor="middle" letter-spacing="0.05em">OPERATIONAL</text>

  <!-- Card 3: Google Gemini -->
  <rect x="524" y="308" width="202" height="86" rx="10" fill="url(#cardGrad)" stroke="#30363D" stroke-width="1"/>
  <circle cx="554" cy="338" r="9" fill="#3FB95022"/>
  <circle cx="554" cy="338" r="5" fill="#3FB950" filter="url(#glow)"/>
  <text x="574" y="344" font-family="'Inter', -apple-system, sans-serif" font-size="15" font-weight="600" fill="#E6EDF3">Gemini</text>
  <text x="574" y="362" font-family="'Inter', -apple-system, sans-serif" font-size="12" fill="#8B949E">Google</text>
  <rect x="541" y="372" width="72" height="18" rx="9" fill="#3FB95022"/>
  <text x="577" y="385" font-family="'Inter', -apple-system, sans-serif" font-size="10" font-weight="600" fill="#3FB950" text-anchor="middle" letter-spacing="0.05em">OPERATIONAL</text>

  <!-- Card 4: AWS Bedrock -->
  <rect x="746" y="308" width="202" height="86" rx="10" fill="url(#cardGrad)" stroke="#30363D" stroke-width="1"/>
  <circle cx="776" cy="338" r="9" fill="#3FB95022"/>
  <circle cx="776" cy="338" r="5" fill="#3FB950" filter="url(#glow)"/>
  <text x="796" y="344" font-family="'Inter', -apple-system, sans-serif" font-size="15" font-weight="600" fill="#E6EDF3">Bedrock</text>
  <text x="796" y="362" font-family="'Inter', -apple-system, sans-serif" font-size="12" fill="#8B949E">Amazon AWS</text>
  <rect x="763" y="372" width="72" height="18" rx="9" fill="#3FB95022"/>
  <text x="799" y="385" font-family="'Inter', -apple-system, sans-serif" font-size="10" font-weight="600" fill="#3FB950" text-anchor="middle" letter-spacing="0.05em">OPERATIONAL</text>

  <!-- Card 5: Azure OpenAI -->
  <rect x="968" y="308" width="152" height="86" rx="10" fill="url(#cardGrad)" stroke="#30363D" stroke-width="1"/>
  <circle cx="994" cy="338" r="9" fill="#3FB95022"/>
  <circle cx="994" cy="338" r="5" fill="#3FB950" filter="url(#glow)"/>
  <text x="1012" y="344" font-family="'Inter', -apple-system, sans-serif" font-size="15" font-weight="600" fill="#E6EDF3">Azure AI</text>
  <text x="1012" y="362" font-family="'Inter', -apple-system, sans-serif" font-size="12" fill="#8B949E">Microsoft</text>
  <rect x="981" y="372" width="72" height="18" rx="9" fill="#3FB95022"/>
  <text x="1017" y="385" font-family="'Inter', -apple-system, sans-serif" font-size="10" font-weight="600" fill="#3FB950" text-anchor="middle" letter-spacing="0.05em">OPERATIONAL</text>

  <!-- Stats row -->
  <rect x="80" y="428" width="340" height="68" rx="8" fill="#21262D" stroke="#30363D" stroke-width="1"/>
  <text x="100" y="455" font-family="'Inter', -apple-system, sans-serif" font-size="11" fill="#8B949E" letter-spacing="0.06em">PROVIDERS MONITORED</text>
  <text x="100" y="484" font-family="'Inter', -apple-system, sans-serif" font-size="28" font-weight="800" fill="#58A6FF">18</text>
  <text x="152" y="484" font-family="'Inter', -apple-system, sans-serif" font-size="14" fill="#8B949E" dy="-4">providers</text>

  <rect x="440" y="428" width="340" height="68" rx="8" fill="#21262D" stroke="#30363D" stroke-width="1"/>
  <text x="460" y="455" font-family="'Inter', -apple-system, sans-serif" font-size="11" fill="#8B949E" letter-spacing="0.06em">HISTORY TRACKED</text>
  <text x="460" y="484" font-family="'Inter', -apple-system, sans-serif" font-size="28" font-weight="800" fill="#3FB950">90</text>
  <text x="514" y="484" font-family="'Inter', -apple-system, sans-serif" font-size="14" fill="#8B949E" dy="-4">day history</text>

  <rect x="800" y="428" width="320" height="68" rx="8" fill="#21262D" stroke="#30363D" stroke-width="1"/>
  <text x="820" y="455" font-family="'Inter', -apple-system, sans-serif" font-size="11" fill="#8B949E" letter-spacing="0.06em">INCLUDES TOOLS</text>
  <text x="820" y="484" font-family="'Inter', -apple-system, sans-serif" font-size="28" font-weight="800" fill="#D2A8FF">4</text>
  <text x="862" y="484" font-family="'Inter', -apple-system, sans-serif" font-size="14" fill="#8B949E" dy="-4">cost &amp; routing tools</text>

  <!-- Footer -->
  <text x="80" y="578" font-family="'Inter', -apple-system, sans-serif" font-size="14" fill="#484F58">lamatic.ai/llm-ops-toolkit</text>

  <!-- Right side: feature pills -->
  <rect x="760" y="560" width="160" height="30" rx="15" fill="#58A6FF1A" stroke="#58A6FF44" stroke-width="1"/>
  <text x="840" y="580" font-family="'Inter', -apple-system, sans-serif" font-size="12" font-weight="500" fill="#58A6FF" text-anchor="middle">Cost Calculator</text>

  <rect x="930" y="560" width="180" height="30" rx="15" fill="#D2A8FF1A" stroke="#D2A8FF44" stroke-width="1"/>
  <text x="1020" y="580" font-family="'Inter', -apple-system, sans-serif" font-size="12" font-weight="500" fill="#D2A8FF" text-anchor="middle">Routing Simulator</text>
</svg>
